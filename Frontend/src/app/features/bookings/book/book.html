<app-component-page>
    <form [formGroup]="prenotationForm" (submit)="handleSubmit()">
        <label>book</label>

        @if (errorMessage) {
            <p>{{ errorMessage }}</p>
        }

        @if (successMessage) {
            <p>{{ successMessage }}</p>
        }

        <section>
            <label>classes</label>
            <input
                type="text"
                placeholder="cerca classe..."
                [(ngModel)]="search"
                [ngModelOptions]="{standalone: true}"
            >
            <div class="class-list">
                @for (class of filteredClasses; track class.id) {
                    <label class="checkbox-item">
                        <input
                            type="checkbox"
                            [checked]="isSelected(class.id)"
                            (change)="toggleClass(class.id)"
                        >
                        {{ class.c }}
                    </label>
                }
            </div>
        </section>

        <section>
            <label>room</label>
            <select formControlName="room">
                <option value="">select room</option>
                @for (room of rooms; track room.id) {
                    <option [value]="room.id">{{ room.n }}</option>
                }
            </select>
        </section>

        <section>
            <label>data</label>
            <input formControlName="date" type="date">
        </section>

        <section>
            <label>from</label>
            <input formControlName="from" type="time">
            <label>to</label>
            <input formControlName="to" type="time">
        </section>

        <section>
            <input type="submit" [disabled]="!prenotationForm.valid" value="book">
        </section>
    </form>
</app-component-page>
