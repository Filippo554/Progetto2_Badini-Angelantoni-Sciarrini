<app-component-page>
    @if (errorMessage) {
        <p>{{ errorMessage }}</p>
    }

    @if (prenotation) {
        <form>
            <label>prenotation</label>
            <section>
                <span>
                    <section>
                        <label>Classes</label>
                        <span>
                            @for (c of prenotation.classes; track c.id) {
                                {{c.c}}{{(c.id < prenotation.classes.length-1) ? ', ' : ''}}
                            }
                        </span>
                    </section>
                    <section>
                        <label>Room</label>
                        <span>{{prenotation.room}}</span>
                    </section>
                    <section>
                        <label>Date</label>
                        <span>{{prenotation.date}}</span>
                    </section>
                    <section>
                        <label>Hours</label>
                        <span>{{prenotation.start}} - {{prenotation.end}}</span>
                    </section>
                    <section>
                        <label>Prof</label>
                        <span>{{prenotation.teacher}}</span>
                    </section>
                </span>
            </section>
        </form>
    }
</app-component-page>
